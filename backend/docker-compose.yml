version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: crypto-aggregator-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aggregator-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-aggregator-app
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      REDIS_URL: redis://redis:6379
      REDIS_DB: 0
      CACHE_TTL: 30
      DEXSCREENER_BASE_URL: https://api.dexscreener.com
      JUPITER_BASE_URL: https://lite-api.jup.ag
      COINGECKO_BASE_URL: https://api.coingecko.com/api/v3
      API_TIMEOUT: 10000
      MAX_RETRIES: 4
      BASE_RETRY_DELAY: 200
      MAX_RETRY_DELAY: 10000
      RATE_LIMIT_WINDOW: 60000
      RATE_LIMIT_MAX: 300
      JOB_FETCH_INTERVAL: 30000
      JOB_RETRY_ATTEMPTS: 3
      LOG_LEVEL: debug
      CORS_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aggregator-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  aggregator-network:
    driver: bridge
